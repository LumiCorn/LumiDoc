<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>妈妈节日快乐</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:"Microsoft YaHei";
}

h1{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;
    color:#ff6b81;
    font-size:42px;
}

p{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    color:white;
    font-size:22px;
}

canvas{
    display:block;
}

.fallingHeart{
    position:absolute;
    color:#ff6b81;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

.clickText{
    position:absolute;
    color:#ff6b81;
    font-size:26px;
    font-weight:bold;
    pointer-events:none;
    animation:rise 2s forwards;
}

@keyframes rise{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-80px);
    }
}
</style>
</head>

<body>

<h1>妈妈 妇女节快乐 ❤️</h1>
<canvas id="c"></canvas>
<p>谢谢你一直以来的付出<br>希望你每天都开心健康<br>不要因为学生就生气</p>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heart(t){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return {x:x,y:y};
}

for(let i=0;i<2000;i++){
    let t = Math.random()*Math.PI*2;
    let p = heart(t);

    particles.push({
        x:p.x,
        y:p.y,
        z:(Math.random()-0.5)*20
    });
}

let angle = 0;
let beat = 1;

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    angle += 0.02;

    beat = 1 + Math.sin(Date.now()*0.005)*0.1;

    particles.forEach(p=>{

        let x = p.x*Math.cos(angle) - p.z*Math.sin(angle);
        let z = p.x*Math.sin(angle) + p.z*Math.cos(angle);
        let y = p.y;

        let scale = 12 * beat;
        let perspective = 300/(300+z);

        let sx = canvas.width/2 + x*scale*perspective;
        let sy = canvas.height/2 - y*scale*perspective;

        ctx.fillStyle="#ff3b6b";
        ctx.fillRect(sx,sy,2,2);
    });

    requestAnimationFrame(draw);
}

draw();

/* 飘落小爱心 */

function createFallingHeart(){

    let heart = document.createElement("div");
    heart.className="fallingHeart";
    heart.innerText="❤";

    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.top="-20px";
    heart.style.fontSize=(10+Math.random()*20)+"px";

    let duration=5+Math.random()*5;
    heart.style.animationDuration=duration+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },duration*1000);
}

setInterval(createFallingHeart,300);


/* 点击出现文字 */

document.addEventListener("click",function(e){

    let text=document.createElement("div");
    text.className="clickText";
    text.innerText="妈妈我爱你 ❤️";

    text.style.left=e.clientX+"px";
    text.style.top=e.clientY+"px";

    document.body.appendChild(text);

    setTimeout(()=>{
        text.remove();
    },2000);

});
</script>

</body>
</html>
